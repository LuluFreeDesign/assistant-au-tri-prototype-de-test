<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trier, réparer, recycler - fauxsite.fr</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a1a; background: #fff; }

    /* Header */
    .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 32px; display: flex; align-items: center; gap: 16px; height: 64px; }
    .header__logo { font-size: 1.1rem; font-weight: 700; color: #111; letter-spacing: -0.3px; }
    .header__logo span { color: #555; font-weight: 400; }
    .header__note { font-size: 0.75rem; color: #999; }

    /* Content */
    .content { max-width: 880px; margin: 0 auto; padding: 40px 32px 64px; }

    .widget-wrapper { border: 1px solid #e5e5e5; border-radius: 6px; overflow: hidden; }
    /* Hauteur initiale modeste — sera ajustée automatiquement par postMessage de l'iframe selon le contenu */
    .widget-wrapper iframe { width: 100%; height: 400px; border: none; display: block; transition: height 0.2s ease; }

    /* Footer */
    .footer { border-top: 1px solid #e5e5e5; padding: 24px 32px; text-align: center; }
    .footer__copy { font-size: 0.8rem; color: #999; }

    @media (max-width: 640px) {
      .header { padding: 0 16px; }
      .content { padding: 32px 16px 48px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header__logo">fauxsite<span>.fr</span></div>
    <span class="header__note">Ceci est un faux site Internet de prototype</span>
  </header>

  <main class="content">
    <div class="widget-wrapper">
      <!-- Variante A/B : ?view=map affiche la carte par défaut sur l'écran solutions (bouton Carte en 1er) -->
      <iframe id="assistant-tri" src="../index.html?view=map" title="Assistant au tri, au réemploi et à la réparation"></iframe>
    </div>
  </main>

  <footer class="footer">
    <p class="footer__copy">Site fictif — © 2026</p>
  </footer>

  <script>
    var iframe = document.getElementById('assistant-tri');
    window.addEventListener('message', function(e) {
      if (!e.data) return;
      // Auto-resize : ajuste la hauteur de l'iframe à son contenu
      if (e.data.type === 'assistant-tri-resize') {
        iframe.style.height = e.data.height + 'px';
      }
      // Scroll en haut de l'iframe lors d'une transition d'étape — simule une navigation entre pages
      if (e.data.type === 'assistant-tri-scroll-to-top') {
        iframe.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  </script>
</body>
</html>
